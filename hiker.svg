<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 210" width="800" height="210" shape-rendering="crispEdges">

  <!-- pixel sun with corner cut -->
  <g fill="#E8743C">
    <rect x="676" y="26" width="32" height="32"/>
    <rect x="668" y="34" width="48" height="16"/>
    <rect x="684" y="18" width="16" height="48"/>
  </g>
  <g fill="#f0925e">
    <rect x="680" y="30" width="8" height="8"/>
  </g>

  <!-- pixel clouds -->
  <g fill="#e8e6df" opacity="0.45">
    <rect x="120" y="40" width="48" height="10"/><rect x="132" y="32" width="28" height="8"/>
    <rect x="430" y="56" width="40" height="9"/><rect x="440" y="49" width="22" height="7"/>
  </g>

  <!-- stepped back mountains, two-tone -->
  <g>
    <path d="M40,210 v-24 h24 v-24 h24 v-24 h24 v24 h24 v24 h24 v24 z" fill="#525f55"/>
    <path d="M40,210 v-24 h24 v-24 h24 v-24 h12 v72 z" fill="#5e6d61"/>
    <path d="M250,210 v-28 h28 v-28 h28 v-28 h28 v-28 h28 v28 h28 v28 h28 v28 h28 v28 z" fill="#48564b"/>
    <path d="M250,210 v-28 h28 v-28 h28 v-28 h28 v-28 h14 v112 z" fill="#525f55"/>
    <path d="M540,210 v-26 h26 v-26 h26 v-26 h26 v26 h26 v26 h26 v26 z" fill="#525f55" opacity="0.8"/>
  </g>
  <!-- pixel snow caps with shadow row -->
  <g>
    <rect x="334" y="98" width="70" height="12" fill="#e8e6df"/>
    <rect x="362" y="70" width="28" height="14" fill="#e8e6df"/>
    <rect x="362" y="84" width="28" height="4" fill="#c9c6ba"/>
    <rect x="334" y="110" width="70" height="4" fill="#c9c6ba"/>
    <rect x="592" y="106" width="52" height="10" fill="#e8e6df" opacity="0.85"/>
  </g>

  <!-- stepped slope, two-tone with grass highlight on each step top -->
  <path fill="#3f5247" d="M0,210 L0,184 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 v-6 h40 L800,210 z"/>
  <g fill="#5b7561">
    <rect x="0" y="184" width="40" height="3"/><rect x="40" y="178" width="40" height="3"/><rect x="80" y="172" width="40" height="3"/><rect x="120" y="166" width="40" height="3"/><rect x="160" y="160" width="40" height="3"/><rect x="200" y="154" width="40" height="3"/><rect x="240" y="148" width="40" height="3"/><rect x="280" y="142" width="40" height="3"/><rect x="320" y="136" width="40" height="3"/><rect x="360" y="130" width="40" height="3"/><rect x="400" y="124" width="40" height="3"/><rect x="440" y="118" width="40" height="3"/><rect x="480" y="112" width="40" height="3"/><rect x="520" y="106" width="40" height="3"/><rect x="560" y="100" width="40" height="3"/><rect x="600" y="94" width="40" height="3"/><rect x="640" y="88" width="40" height="3"/><rect x="680" y="82" width="40" height="3"/><rect x="720" y="76" width="40" height="3"/><rect x="760" y="70" width="40" height="3"/>
  </g>
  <!-- dirt dither pixels -->
  <g fill="#36463d">
    <rect x="60" y="194" width="4" height="4"/><rect x="150" y="180" width="4" height="4"/><rect x="250" y="166" width="4" height="4"/><rect x="370" y="148" width="4" height="4"/><rect x="470" y="134" width="4" height="4"/><rect x="590" y="116" width="4" height="4"/><rect x="690" y="100" width="4" height="4"/>
  </g>

  <!-- pixel trees with shaded side, planted on step tops -->
  <g>
    <g transform="translate(100,172)">
      <rect x="-3" y="-26" width="6" height="6" fill="#2e3f35"/><rect x="-6" y="-20" width="12" height="7" fill="#2e3f35"/><rect x="-9" y="-13" width="18" height="7" fill="#2e3f35"/>
      <rect x="0" y="-26" width="3" height="6" fill="#26352c"/><rect x="2" y="-20" width="4" height="7" fill="#26352c"/><rect x="5" y="-13" width="4" height="7" fill="#26352c"/>
      <rect x="-2" y="-6" width="4" height="6" fill="#5b4632"/>
    </g>
    <g transform="translate(300,142)">
      <rect x="-3" y="-26" width="6" height="6" fill="#2e3f35"/><rect x="-6" y="-20" width="12" height="7" fill="#2e3f35"/><rect x="-9" y="-13" width="18" height="7" fill="#2e3f35"/>
      <rect x="0" y="-26" width="3" height="6" fill="#26352c"/><rect x="2" y="-20" width="4" height="7" fill="#26352c"/><rect x="5" y="-13" width="4" height="7" fill="#26352c"/>
      <rect x="-2" y="-6" width="4" height="6" fill="#5b4632"/>
    </g>
    <g transform="translate(540,106)">
      <rect x="-3" y="-26" width="6" height="6" fill="#2e3f35"/><rect x="-6" y="-20" width="12" height="7" fill="#2e3f35"/><rect x="-9" y="-13" width="18" height="7" fill="#2e3f35"/>
      <rect x="0" y="-26" width="3" height="6" fill="#26352c"/><rect x="2" y="-20" width="4" height="7" fill="#26352c"/><rect x="5" y="-13" width="4" height="7" fill="#26352c"/>
      <rect x="-2" y="-6" width="4" height="6" fill="#5b4632"/>
    </g>
  </g>

  <!-- summit flag on the top step, 2-frame wave -->
  <g transform="translate(782,70)">
    <rect x="0" y="-24" width="3" height="24" fill="#d9c9a3"/>
    <rect x="0" y="-24" width="1" height="24" fill="#bfae8c"/>
    <g fill="#E8743C">
      <path d="M3,-24 h13 v9 h-13 z">
        <animate attributeName="opacity" values="1;0;1" keyTimes="0;0.5;1" calcMode="discrete" dur="0.8s" repeatCount="indefinite"/>
      </path>
      <path d="M3,-24 h10 v3 h3 v6 h-13 z" opacity="0">
        <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" calcMode="discrete" dur="0.8s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- ============ BIG-HEAD PIXEL HIKER (feet locked to step tops) ============ -->
  <g>
    <animateTransform attributeName="transform" type="translate" calcMode="discrete" dur="15.2s" repeatCount="indefinite"
      values="12,184; 30,184; 52,178; 70,178; 92,172; 110,172; 132,166; 150,166; 172,160; 190,160; 212,154; 230,154; 252,148; 270,148; 292,142; 310,142; 332,136; 350,136; 372,130; 390,130; 412,124; 430,124; 452,118; 470,118; 492,112; 510,112; 532,106; 550,106; 572,100; 590,100; 612,94; 630,94; 652,88; 670,88; 692,82; 710,82; 732,76; 750,76"/>
    <g transform="scale(3)">

      <!-- backpack with highlight -->
      <rect x="-7" y="-9" width="3" height="5" fill="#E8743C"/>
      <rect x="-7" y="-9" width="1" height="5" fill="#f0925e"/>
      <rect x="-6" y="-10" width="2" height="1" fill="#c75e2e"/>

      <!-- small body, shaded shirt -->
      <rect x="-3" y="-9" width="6" height="1" fill="#3f7a52"/>
      <rect x="-4" y="-8" width="8" height="3" fill="#3f7a52"/>
      <rect x="2" y="-8" width="2" height="3" fill="#2e5a3c"/>
      <rect x="-3" y="-5" width="6" height="1" fill="#2e5a3c"/>

      <!-- arm + trekking pole -->
      <rect x="3" y="-8" width="2" height="2" fill="#f1c27d"/>
      <rect x="5" y="-8" width="1" height="1" fill="#5b4632"/>
      <rect x="5" y="-7" width="1" height="7" fill="#8a6f4d"/>

      <!-- BIG head: bowl cut, black with shine row -->
      <rect x="-4" y="-18" width="8" height="1" fill="#1a1a1a"/>
      <rect x="-5" y="-17" width="10" height="1" fill="#1a1a1a"/>
      <rect x="-4" y="-17" width="4" height="1" fill="#3a3a3a"/>
      <rect x="-6" y="-16" width="12" height="2" fill="#1a1a1a"/>
      <rect x="-6" y="-14" width="1" height="1" fill="#1a1a1a"/>
      <rect x="5" y="-14" width="1" height="1" fill="#1a1a1a"/>

      <!-- face with right-side shade -->
      <rect x="-5" y="-14" width="10" height="1" fill="#f1c27d"/>
      <rect x="-6" y="-13" width="12" height="2" fill="#f1c27d"/>
      <rect x="-5" y="-11" width="10" height="1" fill="#f1c27d"/>
      <rect x="-4" y="-10" width="8" height="1" fill="#f1c27d"/>
      <rect x="4" y="-13" width="2" height="2" fill="#d9a05f"/>
      <rect x="3" y="-11" width="2" height="1" fill="#d9a05f"/>
      <rect x="2" y="-10" width="2" height="1" fill="#d9a05f"/>

      <!-- big 2x2 eyes with glint -->
      <rect x="-4" y="-13" width="2" height="2" fill="#1a1a1a"/>
      <rect x="1" y="-13" width="2" height="2" fill="#1a1a1a"/>
      <rect x="-4" y="-13" width="1" height="1" fill="#ffffff"/>
      <rect x="1" y="-13" width="1" height="1" fill="#ffffff"/>

      <!-- blush + mouth -->
      <rect x="-5" y="-11" width="1" height="1" fill="#e8a07a"/>
      <rect x="4" y="-11" width="1" height="1" fill="#e8a07a"/>
      <rect x="-1" y="-10" width="2" height="1" fill="#a8632f"/>

      <!-- legs frame A: stride -->
      <g>
        <animate attributeName="opacity" values="1;0;1" keyTimes="0;0.5;1" calcMode="discrete" dur="0.8s" repeatCount="indefinite"/>
        <rect x="-4" y="-4" width="2" height="3" fill="#2e4057"/>
        <rect x="2" y="-4" width="2" height="3" fill="#2e4057"/>
        <rect x="-4" y="-1" width="2" height="1" fill="#1a1a1a"/>
        <rect x="2" y="-1" width="2" height="1" fill="#1a1a1a"/>
      </g>
      <!-- legs frame B: together -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" calcMode="discrete" dur="0.8s" repeatCount="indefinite"/>
        <rect x="-2" y="-4" width="2" height="3" fill="#2e4057"/>
        <rect x="0" y="-4" width="2" height="3" fill="#2e4057"/>
        <rect x="-2" y="-1" width="2" height="1" fill="#1a1a1a"/>
        <rect x="0" y="-1" width="2" height="1" fill="#1a1a1a"/>
      </g>
    </g>
  </g>
</svg>
